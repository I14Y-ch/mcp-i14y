name: Build, Push & Deploy MCP Docker Image to ACR

on:
  push:
    branches:
      - main
      - master
      - releases/*
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  packages: read

env:
  IMAGE_NAME: mcp-i14y

jobs:
  image-build-and-push:
    runs-on: ubuntu-latest
    environment: DEV

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compose image tag
        run: |
          TAG="$(date +"%Y%m%d%H%M%S")-${{ github.run_number }}"
          echo "DOCKER_VERSION=$TAG" >> $GITHUB_ENV
          echo "SHA=${{ github.sha }}" >> $GITHUB_ENV

      - name: Azure Login (UAMI via OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_ACR_UAMI_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_ACR_SUBSCRIPTION_ID }}

      - name: Login to ACR
        env:
          AZURE_ACR: ${{ secrets.AZURE_ACR }}
        run: |
          az acr login --name "${AZURE_ACR}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        env:
          AZURE_ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
        run: |
          IMAGE="${AZURE_ACR_LOGIN_SERVER}/${{ env.IMAGE_NAME }}"
          echo "Building and pushing ${IMAGE}:$DOCKER_VERSION"

          docker buildx build . \
            --push \
            --label org.opencontainers.image.version="$DOCKER_VERSION" \
            --label org.opencontainers.image.revision="$SHA" \
            -t "$IMAGE:$DOCKER_VERSION" \
            -t "$IMAGE:${SHA}" \
            -t "$IMAGE:latest"

      - name: Deploy to DEV
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          AZURE_ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          APP_NAME: ${{ vars.AZURE_CONTAINERAPP_NAME }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          IMAGE="${AZURE_ACR_LOGIN_SERVER}/${{ env.IMAGE_NAME }}:$DOCKER_VERSION"
          echo "Updating Container App $APP_NAME in $RG to image $IMAGE"

          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --image "$IMAGE"

      - name: Show active revision
        run: |
          az containerapp revision list \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "[?properties.active==\`true\`].{name:name, traffic:properties.trafficWeight, image:properties.template.containers[0].image}" \
            -o table
